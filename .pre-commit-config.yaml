repos:
  - repo: local
    hooks:
      - id: dprint-fmt
        name: format with dprint
        entry: dprint fmt
        language: unsupported
        files: \.(css|html|js|json|jsonc|md|py|toml|ts|xml|yaml)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
        exclude: (\.vscode/settings\.json|zed/settings\.json)
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-aws-credentials
        args:
          - --allow-missing-credentials
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-new-submodules
      - id: forbid-submodules
      - id: mixed-line-ending
      - id: pretty-format-json
        exclude: (\.vscode/settings\.json|dprint\.json|zed/settings\.json)
      - id: requirements-txt-fixer
      - id: trailing-whitespace
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      - id: shellcheck
        name: ShellCheck
        language: unsupported
        entry: shellcheck
        files: \.(sh|bash)$
      - id: actionlint
        name: actionlint
        language: unsupported
        entry: actionlint
        files: ^\.github/workflows/.+\.yaml$

      # fish shell is required
      - id: fish-indent
        name: indent fish scripts
        language: unsupported
        entry: fish_indent --write
        files: \.fish$
      - id: fish-syntax
        name: check fish syntax
        language: unsupported
        entry: fish --no-execute
        files: \.fish$
      - id: test-fish-function-mkdir-if-not-exists
        name: test fish function mkdir_if_not_exists
        language: unsupported
        entry: fish tests/test_mkdir_if_not_exists.fish
        files: fish/functions/[^/]+\.fish$
      - id: test-function-prepend-path
        name: test fish function test_prepend_path
        language: unsupported
        entry: fish tests/test_prepend_path.fish
        files: fish/functions/[^/]+\.fish$

      # Test install scripts
      - id: run-ubuntu-install-script
        name: Run install script for Ubuntu
        language: unsupported
        entry: bash
        files: (^|/)install\.sh$
      - id: run-windows-install-script
        name: Run install script for Windows
        language: unsupported
        entry: pwsh
        files: (^|/)install\.ps1$
