name: Check code with pre-commit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chezmoi-and-checks-in-ubuntu:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash --noprofile --norc -euxo pipefail {0}
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Install fish from GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$(mktemp -d)"
          gh release -R fish-shell/fish-shell download -p 'fish-*-linux-x86_64.tar.xz'
          mkdir -p "${HOME}/.local/bin"
          tar -xf fish-*-linux-x86_64.tar.xz -C "${HOME}/.local/bin"
      - uses: dprint/check@v2.3
        with:
          args: --list-different
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false
      - name: Check with pre-commit
        env:
          SKIP: dprint-fmt,actionlint,run-ubuntu-install-script,run-windows-install-script
        run: uvx pre-commit run --all
