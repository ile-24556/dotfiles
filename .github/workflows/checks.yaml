name: checks

on:
  - push
  - pull_request

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: fish-shop/install-fish-shell@v2
      - uses: pre-commit/action@v3.0.1
      - uses: dprint/check@v2.3
  chezmoi-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sh -c "$(curl -fsLS get.chezmoi.io)" -- init --apply --source ./home --exclude scripts --include always
