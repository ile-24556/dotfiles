<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
  <description>Prepend preferable fonts to abstract font families</description>

  <match>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="prepend">
      <string>Open Sans</string>
      <string>IBM Plex Sans JP</string>
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>

  <match>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family">
      <string>serif</string>
    </test>
    <edit name="family" mode="prepend">
      <string>IBM Plex Serif Var</string>
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>

  <match>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="prepend">
      <string>JetBrains Mono</string>
      <string>IBM Plex Sans JP</string>
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>

  <match>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <test name="family">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="prepend">
      <string>Open Sans</string>
      <string>IBM Plex Sans JP</string>
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>

</fontconfig>
