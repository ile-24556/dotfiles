<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
  <description>Prepend my favourite fonts to generic font families</description>

  <!--
    Reject font families that I do not want to see.
  -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family">
          <string>Noto Sans</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Liberation Sans</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Nimbus Sans</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Liberation Mono</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Nimbus Mono</string>
        </patelt>
      </pattern>
    </rejectfont>
  </selectfont>

  <!--
    Resolve generic font families into my custom families.
  -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>my-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>my-sans-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>my-monospace</family>
      <family>my-sans-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>system-ui</family>
    <prefer>
      <family>my-sans-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>ui-serif</family>
    <prefer>
      <family>my-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>ui-sans-serif</family>
    <prefer>
      <family>my-sans-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>ui-monospace</family>
    <prefer>
      <family>my-monospace</family>
      <family>my-sans-serif</family>
    </prefer>
  </alias>

  <!--
    Resolve custom font families into actual families.
    Orders are like: Latin favourite, Latin fallback, Japanese favourite, Japanese fallback
  -->
  <alias>
    <family>my-serif</family>
    <prefer>
      <family>Source Serif 4 Variable</family>
      <family>Noto Serif</family>
      <family>Noto Serif CJK JP</family>
    </prefer>
  </alias>
  <alias>
    <family>my-sans-serif</family>
    <prefer>
      <family>Open Sans</family>
      <family>Noto Sans</family>
      <family>IBM Plex Sans JP</family>
      <family>Noto Sans CJK JP</family>
    </prefer>
  </alias>
  <alias>
    <family>my-monospace</family>
    <prefer>
      <family>JetBrains Mono</family>
      <family>Ubuntu Sans Mono</family>
    </prefer>
  </alias>
</fontconfig>
