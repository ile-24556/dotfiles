<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
  <description>Prepend my favourite fonts to generic font families</description>

  <!--
    Reject font families that I do not want to see.
  -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family">
          <string>Noto Sans</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Liberation Sans</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Nimbus Sans</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Liberation Mono</string>
        </patelt>
      </pattern>
      <pattern>
        <patelt name="family">
          <string>Nimbus Mono</string>
        </patelt>
      </pattern>
    </rejectfont>
  </selectfont>

  <!--
    Defer font familiy that I do not love in Discord UI.
  -->
  <match>
    <test name="prgname"><string>discord</string></test>
    <test name="family">
      <string>Noto Sans CJK JP</string>
    </test>
    <edit name="family" mode="assign">
      <string>my-sans-serif</string>
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>

  <!--
    Resolve generic font families into my custom families.
  -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>my-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>my-sans-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>my-monospace</family>
    </prefer>
  </alias>
  <alias>
    <family>system-ui</family>
    <prefer>
      <family>my-sans-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>ui-serif</family>
    <prefer>
      <family>my-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>ui-sans-serif</family>
    <prefer>
      <family>my-sans-serif</family>
    </prefer>
  </alias>
  <alias>
    <family>ui-monospace</family>
    <prefer>
      <family>my-monospace</family>
    </prefer>
  </alias>

  <!--
    Resolve custom font families into actual families.
  -->
  <alias binding="strong">
    <family>my-serif</family>
    <prefer>
      <family>Source Serif 4 Variable</family>
      <family>Noto Serif CJK JP</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>my-monospace</family>
    <prefer>
      <family>JetBrains Mono</family>
      <family>my-sans-serif</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>my-sans-serif</family>
    <prefer>
      <family>Inter Variable</family>
      <family>IBM Plex Sans JP</family>
    </prefer>
  </alias>
</fontconfig>
